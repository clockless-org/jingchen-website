name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Build
        run: npm run build
      - name: Ensure Cloudflare Pages project exists
        run: |
          npm install --no-save wrangler@3.90.0
          npx wrangler pages project create jingchen-website --production-branch=main || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: e330f4b157e45d92b8bf9264df243dd5
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: e330f4b157e45d92b8bf9264df243dd5
          command: pages deploy dist --project-name=jingchen-website --commit-dirty=true
